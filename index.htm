	<script type="text/javascript">
		$("#mobile-menu-button").on('click', function() {
			var current = $("div.content").data('state');
			if (current == 'open') {
				$("div.content").css('z-index', 'inherit');
				$("div.content").data('state', 'closed');
			} else {
				$("div.content").css('z-index', '-1');
				$("div.content").data('state', 'open');
			}
		});
		function generator_callback() {
			var w = Math.max(document.documentElement.clientWidth, window.innerWidth || 0);
			if (w > 399) w = 400;
			$("#grid img").each(function() {
				if (w < 400 && w > 0) {
					$(this).attr('width', w).width(w);
					$(this).parents('.item').width(w);
				}
				var h = $(this).height() + "px";
				$(this).parents('.item').css({ height: h });
			});
			var container = document.querySelector('#grid');
			var msnry = new Masonry(container, {
				columnWidth: w,
				itemSelector: '.item',
				gutter: 10
			});
		}
		$(window).on('load', function() {
			generator_callback();
		});
