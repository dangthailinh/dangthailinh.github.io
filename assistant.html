  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #050505, #000);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .chat-box {
      width: 420px;
      max-width: 95%;
      background: #111;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      height: 90vh;
      overflow: hidden;
    }

    .chat-container {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      margin: 10px 0;
      animation: fadeIn 0.4s ease;
    }

    .message.selected .bubble {
      outline: 2px solid rgba(0, 255, 255, 0.2);
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: url('https://cdn-icons-png.flaticon.com/512/4712/4712100.png') center/cover;
      margin-right: 10px;
      box-shadow: 0 0 10px cyan;
    }

    .bubble {
      background: #0b2239;
      border-radius: 15px 15px 15px 5px;
      padding: 10px 15px;
      max-width: 80%;
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user {
      justify-content: flex-end;
    }

    .user .bubble {
      background: #0078ff;
      border-radius: 15px 15px 5px 15px;
    }

    .options {
      background: #0b0b0b;
      padding: 10px;
      border-top: 1px solid #222;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .option-btn {
      background: linear-gradient(135deg, #0ff, #0077ff);
      border: none;
      color: #fff;
      padding: 8px 15px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .option-btn:hover {
      transform: scale(1.1);
      background: linear-gradient(135deg, #00eaff, #0057ff);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  <script>
  (function(){
    const input = document.getElementById('siteSearch');
    const resultsEl = document.getElementById('searchResults');
    const clearBtn = document.getElementById('clearSearch');
    const container = document.getElementById('searchContainer');
    let index = [];

    window.addEventListener('load', () => {
      index = [];
      document.querySelectorAll('a[href]').forEach(a => {
        index.push({ title: (a.textContent || a.href).trim(), href: a.getAttribute('href') });
      });

      document.querySelectorAll('#options .option-btn').forEach(btn => {
        const txt = (btn.textContent || '').trim();
        const onclick = btn.getAttribute('onclick') || '';
        const navMatch = onclick.match(/location\.href\s*=\s*['"]([^'"]+)['"]/);
        if (navMatch) index.push({ title: txt || navMatch[1], href: navMatch[1] });
        const topicMatch = onclick.match(/selectTopic\(\s*['"]([^'"]+)['"]\s*\)/);
        if (topicMatch) index.push({ title: txt || topicMatch[1], topic: topicMatch[1] });
      });

      if (typeof window.getSubTopics === 'function') {
        const topics = new Set(index.filter(i => i.topic).map(i => i.topic));
        topics.forEach(t => {
          try {
            const subs = window.getSubTopics(t) || [];
            subs.forEach(s => index.push({ title: s.name, href: s.link, topic: t }));
          } catch (e) { /* ignore */ }
        });
      }
    });

    function renderResults(list) {
      resultsEl.innerHTML = '';
      if (!list.length) {
        resultsEl.style.display = 'none';
        return;
      }
      resultsEl.style.display = 'block';
      list.slice(0, 12).forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.style.display = 'block';
        btn.style.width = '100%';
        btn.style.textAlign = 'left';
        btn.style.padding = '8px 10px';
        btn.style.marginBottom = '6px';
        btn.textContent = item.title;
        btn.onclick = () => {
          if (item.href) {
            window.location.href = item.href;
            return;
          }
          if (item.topic && typeof window.selectTopic === 'function') {
            window.selectTopic(item.topic);
            return;
          }
        };
        resultsEl.appendChild(btn);
      });
    }

    function search(q) {
      if (!q) { renderResults([]); return; }
      const s = q.trim().toLowerCase();
      const filtered = index.filter(it => {
        return (it.title && it.title.toLowerCase().includes(s)) ||
               (it.href && it.href.toLowerCase().includes(s)) ||
               (it.topic && it.topic.toLowerCase().includes(s));
      });
      renderResults(filtered);
    }

    input.addEventListener('input', (e) => {
      search(e.target.value);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        input.value = '';
        renderResults([]);
        input.blur();
      }
      if (e.key === 'Enter') {
        const first = resultsEl.querySelector('.option-btn');
        if (first) first.click();
      }
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      renderResults([]);
      input.focus();
    });

    document.addEventListener('click', (e) => {
      if (!container.contains(e.target)) {
        resultsEl.style.display = 'none';
      }
    });
  })();
  </script>

    }

    function addMessage(text, sender = "bot") {
      const msg = document.createElement("div");
      msg.className = `message ${sender === "user" ? "user" : ""} fade-in`;
      msg.innerHTML = sender === "bot"
        ? `<div class="avatar"></div><div class="bubble">${escapeHtml(text)}</div>`
        : `<div class="bubble">${escapeHtml(text)}</div>`;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      playSound();
    }

    // Basic escaping to preserve text
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\n/g, "<br>");
    }

    // ---------- Free chat helpers ----------
    function sendFreeChat() {
      const inputEl = document.getElementById('freeChatInput');
      if (!inputEl) return;
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      inputEl.value = '';
      // simulate assistant reply
      setTimeout(() => {
        const reply = generateReply(text);
        addMessage(reply, 'bot');
      }, 700);
    }

    function generateReply(text) {
      const s = (text || '').toLowerCase();
      // sanitized polite replies

      if (s.includes('phim') && s.includes('phim')) return "Bạn thích thể loại gì? Mình có thể gợi ý vài phim.";
      if (s.includes('mẹo') && s.includes('lập trình')) return "Hãy thử chia nhỏ vấn đề, debug từng bước và viết test nhỏ.";
         if (s.includes('ngu') && s.includes('ngu')) return "Ngu con cặc!Đã biết mặc tã chưa mà chửi thầy?";
          if (s.includes('địt') && s.includes('địt')) return "địt mẹ mày!"; 
           if (s.includes('là ') && s.includes('cái gì')) return "nghĩa là cái gì?";
      if (s.includes('giúp') && s.includes('học')) return "Mình có thể giúp bạn với các mẹo học tập và tài nguyên.";  
      if (s.includes('mày') && s.includes('ngu')) return "Tao không ngu, mày mù à?";
      if (s.includes('1+1')) return "1+1=2 chứ còn gì nữa!";  
      if (s.includes('chat bot')) return "Đúng rồi, tôi là một trợ lý ảo được lập trình để giúp bạn!";  
      if (s.includes('mày') && s.includes('chat bot')) return "Đúng rồi, tôi là một trợ lý ảo được lập trình để giúp bạn!";

         if (s.includes('chat bot') && s.includes('ngu')) return "Không tôi là bot trả lời theo lập trình không phải chat gpt";
    
      if (s.includes('?')) return "Câu hỏi hay — bạn có thể nói rõ hơn để mình trả lời chi tiết hơn không?";
      return "Chưa có câu trả lời cho câu hỏi của bé cưng nha :" + text;
    }

    

    function chatClickHandler(e) {
      const msgEl = e.target.closest('.message');
      if (!msgEl) return;
      // highlight selection briefly
      chat.querySelectorAll('.message').forEach(m => m.classList.remove('selected'));
      msgEl.classList.add('selected');
      setTimeout(() => msgEl.classList.remove('selected'), 1800);

      const bubble = msgEl.querySelector('.bubble');
      if (!bubble) return;
      const inputEl = document.getElementById('freeChatInput');
      if (inputEl) {
        // Prefill with quoted text for reply
        inputEl.value = `${bubble.textContent.trim()}`;
        inputEl.focus();
        // move cursor to end
        inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length);
      }
    }

   
    function removeChatClickHandler() {
      try { chat.removeEventListener('click', chatClickHandler); } catch(e) {}
    }


    window.addEventListener('beforeunload', removeChatClickHandler);

  </script>
