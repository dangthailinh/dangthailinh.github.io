name: Update LoL profile

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-lol-profile
  cancel-in-progress: true

jobs:
  update-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Riot profile data
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          RIOT_GAME_NAME: Anh độ mundo
          RIOT_TAG_LINE: độ36
          RIOT_PLATFORM: vn2
          RIOT_REGION: sea
          RIOT_MATCH_COUNT: 8
        run: node scripts/update-lol-profile.mjs

      - name: Commit refreshed profile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/lol-profile.json
          if git diff --cached --quiet; then
            echo "Profile data is already current."
          else
            git commit -m "chore: update LoL profile data"
            git push
          fi
